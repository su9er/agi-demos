# Model pricing configuration (per million tokens in USD)
# Updated: January 2025
#
# This file defines pricing for all supported LLM models.
# Prices are in USD per million tokens.
# Fields:
#   input: Cost for input/prompt tokens
#   output: Cost for output/completion tokens
#   cache_read: Cost for cached input tokens (optional)
#   cache_write: Cost for tokens written to cache (optional)
#   reasoning: Cost for reasoning tokens (optional, defaults to output if not set)
#   context_over_200k: Pricing for contexts >200k tokens (optional)

# Default pricing for unknown models
default:
  input: "0.15"
  output: "0.60"

# All supported models
models:
  # OpenAI models
  gpt-4o:
    input: "2.50"
    output: "10.00"

  gpt-4o-mini:
    input: "0.15"
    output: "0.60"

  gpt-4-turbo:
    input: "10.00"
    output: "30.00"

  gpt-4:
    input: "30.00"
    output: "60.00"

  gpt-3.5-turbo:
    input: "0.50"
    output: "1.50"

  # OpenAI Reasoning models
  o1:
    input: "15.00"
    output: "60.00"
    reasoning: "60.00"

  o1-mini:
    input: "3.00"
    output: "12.00"
    reasoning: "12.00"

  o3-mini:
    input: "1.10"
    output: "4.40"
    reasoning: "4.40"

  # Anthropic models
  claude-3-5-sonnet:
